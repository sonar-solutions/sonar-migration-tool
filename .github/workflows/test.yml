name: Test and Analyze

on:
  workflow_dispatch:

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go library tests with coverage
        working-directory: lib/sq-api-go
        run: go test ./... -coverprofile=coverage.out -count=1

      - name: Run Go migration tool tests with coverage
        working-directory: go
        run: go test $(go list ./... | grep -v '/cmd$') -coverprofile=coverage.out -count=1

      - name: SonarQube Cloud Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
